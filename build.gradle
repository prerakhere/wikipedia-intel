plugins {
    id 'java'
    id 'application'
}

group = 'com.wikipedia.intel'
version = '0.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    // Kafka
    implementation 'org.apache.kafka:kafka-clients:3.7.0'
    implementation 'org.apache.kafka:kafka-streams:3.7.0'

    // JSON parsing
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'

    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.12'
    implementation 'ch.qos.logback:logback-classic:1.5.3'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'net.jqwik:jqwik:1.8.4'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.apache.kafka:kafka-streams-test-utils:3.7.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'com.wikipedia.intel.App'
}

tasks.register('verifyKafka', JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.wikipedia.intel.KafkaVerify'
}

tasks.register('runPhase1', JavaExec) {
    group = 'application'
    description = 'Run the SSE ingest consumer (Phase 1)'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.wikipedia.intel.sse.SseIngestApp'
}

tasks.named('test') {
    useJUnitPlatform()
}
